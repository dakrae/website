# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: dakrae/website
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/7acf47ff-d724-4653-84d9-e5c29e604107/pkce
  auth_token_endpoint: /sites/7acf47ff-d724-4653-84d9-e5c29e604107/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://davidkraehenbuehl.netlify.app

media_folder: "dk-website/public/images"
public_folder: "/images"

collections:
  - name: "shows"
    label: "Live Dates"
    folder: "dk-website/src/content/shows"
    create: true
    slug: "{{fields.venue}}-{{fields.date}}"
    fields:
      - { label: "Date (DD.MM.YY)", name: "date", widget: "string" }
      - { label: "Act", name: "act", widget: "string", default: "loophole" }
      - { label: "Venue", name: "venue", widget: "string" }
      - { label: "City", name: "city", widget: "string" }
      - { label: "Link (optional)", name: "url", widget: "string", required: false }

  - name: "collaborations"
    label: "Collaborations"
    folder: "dk-website/src/content/collaborations"
    create: true
    slug: "{{fields.name}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Link (optional)", name: "url", widget: "string", required: false }
      - { label: "Photo (optional)", name: "image", widget: "image", required: false }
      - { label: "Order", name: "order", widget: "number", default: 0 }
